name: money_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: MomoSignature
      fonts:
        - asset: fonts/MomoSignature-Regular.ttf
    - family: Nunito
      fonts:
        - asset: fonts/Nunito-Italic-VariableFont_wght.ttf
          style: italic
        - asset: fonts/Nunito-VariableFont_wght.ttf
          style: normal
    - family: Oswald
      fonts:
        - asset: fonts/Oswald-VariableFont_wght.ttf
